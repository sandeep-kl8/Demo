name: RU Build Pipeline

on:  [push]

jobs:

  # 1️⃣ Parallel RU Builds
  build_ru:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ru: [RU1, RU2, RU3]

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.ru }}
        run: |
          echo "Building ${{ matrix.ru }}"
          mkdir -p output
          echo "${{ matrix.ru }} build artifact" > output/${{ matrix.ru }}.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.ru }}
          path: output/

  # 2️⃣ Assembly Job (Waits for all RUs)
  assembly:
    needs: build_ru
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble Build
        run: |
          echo "Assembling..."
          ls -R artifacts
          mkdir installer
          echo "Final Assembly" > installer/app.bundle

      - uses: actions/upload-artifact@v4
        with:
          name: assembly
          path: installer/

  # 3️⃣ Installer Build
  installer:
    needs: assembly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: assembly

      - name: Create Installer
        run: |
          mkdir release
          echo "Installer built" > release/setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: release/
